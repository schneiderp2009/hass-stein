title: STEIN
views:
  - title: Übersicht
    path: uebersicht
    icon: mdi:home-group
    cards:
      - type: custom:mushroom-title-card
        title: STEIN Einsatzbereitschaft

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('entity_id', 'search', 'stein.*status') | selectattr('state', 'equalto', 'Einsatzbereit') | list | count }}"
            secondary: Einsatzbereit
            icon: mdi:check-circle
            icon_color: green
            layout: vertical
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('entity_id', 'search', 'stein.*status') | selectattr('state', 'equalto', 'Bedingt einsatzbereit') | list | count }}"
            secondary: Bedingt
            icon: mdi:alert-circle
            icon_color: orange
            layout: vertical
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('entity_id', 'search', 'stein.*status') | selectattr('state', 'equalto', 'Nicht einsatzbereit') | list | count }}"
            secondary: Nicht bereit
            icon: mdi:close-circle
            icon_color: red
            layout: vertical
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('entity_id', 'search', 'stein.*status') | selectattr('state', 'equalto', 'Im Einsatz') | list | count }}"
            secondary: Im Einsatz
            icon: mdi:fire-truck
            icon_color: blue
            layout: vertical
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('entity_id', 'search', 'stein.*status') | selectattr('state', 'equalto', 'In Wartung') | list | count }}"
            secondary: Wartung
            icon: mdi:wrench
            icon_color: purple
            layout: vertical

      - type: custom:auto-entities
        card:
          type: entities
          title: "Handlungsbedarf"
          show_header_toggle: false
        filter:
          include:
            - entity_id: sensor.stein_*_status
              state: "Nicht einsatzbereit"
            - entity_id: sensor.stein_*_status
              state: "Bedingt einsatzbereit"
            - entity_id: sensor.stein_*_status
              state: "In Wartung"
        sort:
          method: state

      - type: custom:mushroom-entity-card
        entity: sensor.stein_verbindung
        name: API Verbindung
        icon: mdi:account-circle

  - title: Gruppen
    path: gruppen
    icon: mdi:folder-multiple
    cards:
      - type: custom:mushroom-title-card
        title: Ressourcen nach Gruppe

      - type: custom:auto-entities
        card:
          type: entities
          title: "Fahrzeuge (Gruppe 1)"
          show_header_toggle: false
        filter:
          include:
            - entity_id: sensor.stein_*_status
              attributes:
                group_id: 1
        sort:
          method: attribute
          attribute: sort_order

      - type: custom:auto-entities
        card:
          type: entities
          title: "Personal (Gruppe 3)"
          show_header_toggle: false
        filter:
          include:
            - entity_id: sensor.stein_*_status
              attributes:
                group_id: 3
        sort:
          method: attribute
          attribute: sort_order

      - type: custom:auto-entities
        card:
          type: entities
          title: "Einheiten (Gruppe 4)"
          show_header_toggle: false
        filter:
          include:
            - entity_id: sensor.stein_*_status
              attributes:
                group_id: 4
        sort:
          method: attribute
          attribute: sort_order

      - type: custom:auto-entities
        card:
          type: entities
          title: "Anhaenger (Gruppe 5)"
          show_header_toggle: false
        filter:
          include:
            - entity_id: sensor.stein_*_status
              attributes:
                group_id: 5
        sort:
          method: attribute
          attribute: sort_order

  - title: Lage
    path: lage
    icon: mdi:alert-circle
    cards:
      - type: custom:mushroom-title-card
        title: Aktuelle Lage

      - type: custom:auto-entities
        card:
          type: entities
          title: "Im Einsatz"
          show_header_toggle: false
        filter:
          include:
            - entity_id: sensor.stein_*_status
              state: "Im Einsatz"
        sort:
          method: friendly_name

      - type: custom:auto-entities
        card:
          type: entities
          title: "Bedingt einsatzbereit"
          show_header_toggle: false
        filter:
          include:
            - entity_id: sensor.stein_*_status
              state: "Bedingt einsatzbereit"
        sort:
          method: friendly_name

      - type: custom:auto-entities
        card:
          type: entities
          title: "Nicht einsatzbereit"
          show_header_toggle: false
        filter:
          include:
            - entity_id: sensor.stein_*_status
              state: "Nicht einsatzbereit"
        sort:
          method: friendly_name

      - type: custom:auto-entities
        card:
          type: entities
          title: "In Wartung"
          show_header_toggle: false
        filter:
          include:
            - entity_id: sensor.stein_*_status
              state: "In Wartung"
        sort:
          method: friendly_name

  - title: Alle Assets
    path: alle
    icon: mdi:format-list-bulleted
    cards:
      - type: custom:mushroom-title-card
        title: Alle Ressourcen

      - type: custom:auto-entities
        card:
          type: entities
          show_header_toggle: false
        filter:
          include:
            - entity_id: sensor.stein_*_status
        sort:
          method: attribute
          attribute: group_id

  - title: Bearbeiten
    path: bearbeiten
    icon: mdi:pencil
    cards:
      - type: custom:mushroom-title-card
        title: Assets bearbeiten
        subtitle: Status und Felder direkt aendern

      - type: custom:auto-entities
        card:
          type: entities
          title: Status aendern
          show_header_toggle: false
        filter:
          include:
            - entity_id: select.stein_*
        sort:
          method: friendly_name

      - type: custom:auto-entities
        card:
          type: entities
          title: Einsatzreservierungen
          show_header_toggle: false
        filter:
          include:
            - entity_id: switch.stein_*
        sort:
          method: friendly_name

  - title: Ortsverband
    path: ortsverband
    icon: mdi:information
    cards:
      - type: custom:mushroom-title-card
        title: Ortsverband

      - type: custom:auto-entities
        card:
          type: entities
          title: BU Statistiken
          show_header_toggle: false
        filter:
          include:
            - entity_id: sensor.stein_bu_*
        sort:
          method: friendly_name

      - type: entities
        title: API Verbindung
        entities:
          - entity: sensor.stein_verbindung
            name: Nutzer
          - type: attribute
            entity: sensor.stein_verbindung
            attribute: email
            name: E-Mail
            icon: mdi:email
          - type: attribute
            entity: sensor.stein_verbindung
            attribute: scope
            name: Zugriffsbereich
            icon: mdi:shield-account
          - type: attribute
            entity: sensor.stein_verbindung
            attribute: active
            name: Aktiv
            icon: mdi:check-circle
