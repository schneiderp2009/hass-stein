title: STEIN
views:
  - title: STEIN
    path: stein
    icon: mdi:home-group
    max_columns: 1
    cards:

      # ── Ortsverband Info ────────────────────────────────────────────────
      - type: custom:mushroom-template-card
        primary: >
          {{ state_attr('sensor.schwabisch_gmund_fahrzeuge_gesamt','name') | default('THW OV') }}
          ({{ state_attr('sensor.schwabisch_gmund_fahrzeuge_gesamt','code') | default('') }})
        secondary: >
          {% set r = state_attr('sensor.schwabisch_gmund_fahrzeuge_gesamt','stats_ready') | default(0) | int %}
          {% set p = state_attr('sensor.schwabisch_gmund_fahrzeuge_gesamt','readiness_pct') | default(0) | int %}
          {{ r }} Einsatzbereit · {{ p }}% · {{ state_attr('sensor.stein_api_stein_verbindung','email') | default('') }}
        icon: mdi:home-group
        icon_color: >
          {% set p = state_attr('sensor.schwabisch_gmund_fahrzeuge_gesamt','readiness_pct') | default(0) | int %}
          {% if p >= 75 %}green{% elif p >= 50 %}orange{% else %}red{% endif %}
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.popup
            data:
              title: Ortsverband & API
              content:
                type: vertical-stack
                cards:
                  - type: entities
                    title: Ortsverband
                    show_header_toggle: false
                    entities:
                      - type: attribute
                        entity: sensor.schwabisch_gmund_fahrzeuge_gesamt
                        attribute: name
                        name: Name
                        icon: mdi:home-group
                      - type: attribute
                        entity: sensor.schwabisch_gmund_fahrzeuge_gesamt
                        attribute: code
                        name: Kuerzel
                        icon: mdi:identifier
                      - type: attribute
                        entity: sensor.schwabisch_gmund_fahrzeuge_gesamt
                        attribute: id
                        name: ID
                        icon: mdi:numeric
                      - type: attribute
                        entity: sensor.schwabisch_gmund_fahrzeuge_gesamt
                        attribute: region_id
                        name: Region-ID
                        icon: mdi:map-marker
                      - type: attribute
                        entity: sensor.schwabisch_gmund_fahrzeuge_gesamt
                        attribute: author
                        name: Erstellt von
                        icon: mdi:account
                      - type: attribute
                        entity: sensor.schwabisch_gmund_fahrzeuge_gesamt
                        attribute: last_modified
                        name: Letzte Aenderung
                        icon: mdi:clock-edit
                  - type: markdown
                    content: >
                      **Kommentar / Kontakt**

                      {{ state_attr('sensor.schwabisch_gmund_fahrzeuge_gesamt','comment') | default('') | replace(' - ','\n- ') }}
                  - type: entities
                    title: Einsatzstatistik
                    show_header_toggle: false
                    entities:
                      - type: attribute
                        entity: sensor.schwabisch_gmund_fahrzeuge_gesamt
                        attribute: stats_ready
                        name: Einsatzbereit
                        icon: mdi:check-circle
                      - type: attribute
                        entity: sensor.schwabisch_gmund_fahrzeuge_gesamt
                        attribute: stats_notready
                        name: Nicht einsatzbereit
                        icon: mdi:close-circle
                      - type: attribute
                        entity: sensor.schwabisch_gmund_fahrzeuge_gesamt
                        attribute: stats_semiready
                        name: Bedingt bereit
                        icon: mdi:alert-circle
                      - type: attribute
                        entity: sensor.schwabisch_gmund_fahrzeuge_gesamt
                        attribute: stats_inuse
                        name: Im Einsatz
                        icon: mdi:fire-truck
                      - type: attribute
                        entity: sensor.schwabisch_gmund_fahrzeuge_gesamt
                        attribute: stats_maint
                        name: In Wartung
                        icon: mdi:wrench
                      - type: attribute
                        entity: sensor.schwabisch_gmund_fahrzeuge_gesamt
                        attribute: readiness_pct
                        name: Einsatzbereit %
                        icon: mdi:chart-bar
                  - type: entities
                    title: API Verbindung
                    show_header_toggle: false
                    entities:
                      - entity: sensor.stein_api_stein_verbindung
                        name: Nutzer
                      - type: attribute
                        entity: sensor.stein_api_stein_verbindung
                        attribute: email
                        name: E-Mail
                        icon: mdi:email
                      - type: attribute
                        entity: sensor.stein_api_stein_verbindung
                        attribute: scope
                        name: Zugriffsbereich
                        icon: mdi:shield-account
                      - type: attribute
                        entity: sensor.stein_api_stein_verbindung
                        attribute: scope_role_permission
                        name: Berechtigung
                        icon: mdi:key

      # ── Statuskacheln ────────────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: >
              {{ states.sensor | selectattr('attributes.status_raw','defined')
                 | selectattr('attributes.bu_id','defined')
                 | selectattr('attributes.status_raw','equalto','ready') | list | count }}
            secondary: Bereit
            icon: mdi:check-circle
            icon_color: green
            layout: vertical
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: Bereit
          - type: custom:mushroom-template-card
            primary: >
              {{ states.sensor | selectattr('attributes.status_raw','defined')
                 | selectattr('attributes.bu_id','defined')
                 | selectattr('attributes.status_raw','equalto','semiready') | list | count }}
            secondary: Bedingt
            icon: mdi:alert-circle
            icon_color: orange
            layout: vertical
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: Bedingt
          - type: custom:mushroom-template-card
            primary: >
              {{ states.sensor | selectattr('attributes.status_raw','defined')
                 | selectattr('attributes.bu_id','defined')
                 | selectattr('attributes.status_raw','equalto','notready') | list | count }}
            secondary: Nicht bereit
            icon: mdi:close-circle
            icon_color: red
            layout: vertical
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: Nicht bereit
          - type: custom:mushroom-template-card
            primary: >
              {{ states.sensor | selectattr('attributes.status_raw','defined')
                 | selectattr('attributes.bu_id','defined')
                 | selectattr('attributes.status_raw','equalto','inuse') | list | count }}
            secondary: Im Einsatz
            icon: mdi:fire-truck
            icon_color: blue
            layout: vertical
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: Im Einsatz
          - type: custom:mushroom-template-card
            primary: >
              {{ states.sensor | selectattr('attributes.status_raw','defined')
                 | selectattr('attributes.bu_id','defined')
                 | selectattr('attributes.status_raw','equalto','maint') | list | count }}
            secondary: Wartung
            icon: mdi:wrench
            icon_color: purple
            layout: vertical
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: Wartung

      # ── Filter-Chips ─────────────────────────────────────────────────────
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            content: Alle
            icon: mdi:format-list-bulleted
            icon_color: "{% if states('input_select.stein_filter') == 'Alle' %}blue{% else %}grey{% endif %}"
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: Alle
          - type: template
            content: Fahrzeuge
            icon: mdi:fire-truck
            icon_color: "{% if states('input_select.stein_filter') == 'Gruppe 1' %}blue{% else %}grey{% endif %}"
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Gruppe 1"
          - type: template
            content: Geraete
            icon: mdi:tools
            icon_color: "{% if states('input_select.stein_filter') == 'Gruppe 2' %}brown{% else %}grey{% endif %}"
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Gruppe 2"
          - type: template
            content: Sonderfunkt.
            icon: mdi:star
            icon_color: "{% if states('input_select.stein_filter') == 'Gruppe 3' %}teal{% else %}grey{% endif %}"
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Gruppe 3"
          - type: template
            content: Einheiten
            icon: mdi:account-group
            icon_color: "{% if states('input_select.stein_filter') == 'Gruppe 4' %}purple{% else %}grey{% endif %}"
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Gruppe 4"
          - type: template
            content: Anhaenger
            icon: mdi:truck-trailer
            icon_color: "{% if states('input_select.stein_filter') == 'Gruppe 5' %}orange{% else %}grey{% endif %}"
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Gruppe 5"
          - type: template
            content: Probleme
            icon: mdi:alert
            icon_color: "{% if states('input_select.stein_filter') == 'Probleme' %}red{% else %}grey{% endif %}"
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: Probleme

      # ── Gruppe 1: Fahrzeuge ───────────────────────────────────────────────
      - type: custom:mushroom-title-card
        title: Fahrzeuge
        card_mod:
          style: ":host { display: {{ 'block' if states('input_select.stein_filter') in ['Alle','Gruppe 1','Bereit','Bedingt','Nicht bereit','Im Einsatz','Wartung','Probleme'] else 'none' }}; }"

      - type: custom:auto-entities
        card:
          type: custom:auto-entities
          card:
            type: vertical-stack
            cards: []
        filter:
          include:
            - attributes:
                bu_id: 19
                group_id: 1
              card_mod:
                style: |
                  :host {
                    --icon-color: {% set s = state_attr(config.entity, 'status_raw') %}
                      {% if s == 'ready' %}green{% elif s == 'notready' %}red{% elif s == 'semiready' %}orange{% elif s == 'inuse' %}blue{% elif s == 'maint' %}purple{% else %}grey{% endif %};
                  }
        card:
          type: custom:mushroom-template-card
          primary: "{{ state_attr(entity,'label') | default(state_attr(entity,'friendly_name')) }}"
          secondary: "{{ states(entity) }}{% if state_attr(entity,'comment') and state_attr(entity,'comment') | trim | length > 0 %} · {{ state_attr(entity,'comment') }}{% endif %}"
          icon: >
            {% set s = state_attr(entity,'status_raw') %}
            {% if s == 'ready' %}mdi:check-circle{% elif s == 'notready' %}mdi:close-circle{% elif s == 'semiready' %}mdi:alert-circle{% elif s == 'inuse' %}mdi:fire-truck{% elif s == 'maint' %}mdi:wrench{% else %}mdi:help-circle{% endif %}
          icon_color: >
            {% set s = state_attr(entity,'status_raw') %}
            {% if s == 'ready' %}green{% elif s == 'notready' %}red{% elif s == 'semiready' %}orange{% elif s == 'inuse' %}blue{% elif s == 'maint' %}purple{% else %}grey{% endif %}
          tap_action:
            action: more-info
        sort:
          method: attribute
          attribute: sort_order
        show_empty: false
        card_mod:
          style: ":host { display: {{ 'block' if states('input_select.stein_filter') in ['Alle','Gruppe 1','Bereit','Bedingt','Nicht bereit','Im Einsatz','Wartung','Probleme'] else 'none' }}; }"

      # ── Gruppe 2: Geraete ─────────────────────────────────────────────────
      - type: custom:mushroom-title-card
        title: Geraete
        card_mod:
          style: ":host { display: {{ 'block' if states('input_select.stein_filter') in ['Alle','Gruppe 2','Bereit','Bedingt','Nicht bereit','Im Einsatz','Wartung','Probleme'] else 'none' }}; }"

      - type: custom:auto-entities
