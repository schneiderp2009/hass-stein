                    entities:
                    - '{{ config.entity | replace(''sensor.'',''select.'') | replace(''_status'',''_status_setzen'') }}'
                    - '{{ config.entity | replace(''sensor.'',''switch.'') | replace(''_status'',''_einsatzreservierung'') }}'
                  - type: entities
                    title: Bearbeiten
                    show_header_toggle: false
                    entities:
                    - '{{ config.entity | replace(''sensor.'',''text.'') | replace(''_status'',''_bezeichnung'') }}'
                    - '{{ config.entity | replace(''sensor.'',''text.'') | replace(''_status'',''_name'') }}'
                    - '{{ config.entity | replace(''sensor.'',''text.'') | replace(''_status'',''_funkrufname'') }}'
                    - '{{ config.entity | replace(''sensor.'',''text.'') | replace(''_status'',''_kommentar'') }}'
