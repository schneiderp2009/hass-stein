                      - entity: switch.lkw_werkstatt_einsatzreservierung
                        name: Einsatzreservierung
                      - entity: text.lkw_werkstatt_label
                        name: Bezeichnung
                      - entity: text.lkw_werkstatt_radioname
                        name: Funkrufname
                      - entity: text.lkw_werkstatt_comment
                        name: Kommentar
                  - type: entities
                    title: Details
                    show_header_toggle: false
                    entities:
                      - type: attribute
