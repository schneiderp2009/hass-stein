            attribute: sort_order
          show_empty: false

      - type: conditional
        conditions:
          - condition: state
            entity: input_select.stein_filter
            state: Wartung
        card:
          type: custom:auto-entities
          card:
            type: grid
            columns: 1
            square: false
          card_param: cards
          filter:
            include:
              - attributes:
                  bu_id: 19
                  status_raw: maint
