  - title: "Technischer Berater Arbeitssicherheit"
    path: asset-29503
    icon: mdi:fire-truck
    cards:

      - type: custom:mushroom-title-card
        title: "Technischer Berater Arbeitssicherheit"
        subtitle: >
          {{ state_attr('sensor.technischer_berater_arbeitssicherheit_status', 'category') }} ·
          Gruppe 3 · ID 29503

      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.technischer_berater_arbeitssicherheit_status') }}"
        secondary: >
          {{ state_attr('sensor.technischer_berater_arbeitssicherheit_status', 'radio_name') }}
          {%- if state_attr('sensor.technischer_berater_arbeitssicherheit_status', 'operation_reservation') %} · Einsatzreserviert{%- endif %}
        icon: >
          {%- set s = state_attr('sensor.technischer_berater_arbeitssicherheit_status', 'status_raw') -%}
          {%- if s == 'ready' %}mdi:check-circle
          {%- elif s == 'notready' %}mdi:close-circle
          {%- elif s == 'semiready' %}mdi:alert-circle
          {%- elif s == 'inuse' %}mdi:fire-truck
          {%- else %}mdi:wrench{%- endif %}
        icon_color: >
          {%- set s = state_attr('sensor.technischer_berater_arbeitssicherheit_status', 'status_raw') -%}
          {%- if s == 'ready' %}green
          {%- elif s == 'notready' %}red
          {%- elif s == 'semiready' %}orange
          {%- elif s == 'inuse' %}blue
          {%- else %}purple{%- endif %}

      - type: entities
        title: Status aendern
        show_header_toggle: false
        entities:
          - entity: select.technischer_berater_arbeitssicherheit_status_setzen
            name: Status
          - entity: switch.technischer_berater_arbeitssicherheit_einsatzreservierung
            name: Einsatzreservierung

      - type: entities
        title: Felder bearbeiten
        show_header_toggle: false
        entities:
          - entity: text.technischer_berater_arbeitssicherheit_label
            name: Bezeichnung
          - entity: text.technischer_berater_arbeitssicherheit_name
            name: Name
          - entity: text.technischer_berater_arbeitssicherheit_comment
            name: Kommentar
          - entity: text.technischer_berater_arbeitssicherheit_category
            name: Kategorie
          - entity: text.technischer_berater_arbeitssicherheit_radioname
            name: Funkrufname
          - entity: text.technischer_berater_arbeitssicherheit_issi
            name: ISSI

      - type: entities
        title: Informationen
        show_header_toggle: false
        entities:
          - type: attribute
            entity: sensor.technischer_berater_arbeitssicherheit_status
            attribute: radio_name
            name: Funkrufname
            icon: mdi:radio
          - type: attribute
            entity: sensor.technischer_berater_arbeitssicherheit_status
            attribute: issi
            name: ISSI
            icon: mdi:signal
          - type: attribute
            entity: sensor.technischer_berater_arbeitssicherheit_status
            attribute: category
            name: Kategorie
            icon: mdi:shape
          - type: attribute
            entity: sensor.technischer_berater_arbeitssicherheit_status
            attribute: hu_valid_until
            name: HU gueltig bis
            icon: mdi:calendar-check
          - type: attribute
            entity: sensor.technischer_berater_arbeitssicherheit_status
            attribute: comment
            name: Kommentar
            icon: mdi:comment-text

      - type: custom:mushroom-template-card
        primary: Zuletzt geaendert
        secondary: >
          {%- set by = state_attr('sensor.technischer_berater_arbeitssicherheit_status', 'last_modified_by') -%}
          {%- set ts = state_attr('sensor.technischer_berater_arbeitssicherheit_status', 'last_modified') -%}
          {%- if by and ts -%}
            von {{ by }} am {{ as_timestamp(ts) | timestamp_custom('%d. %b %Y %H:%M') }}
          {%- elif ts -%}
            {{ as_timestamp(ts) | timestamp_custom('%d. %b %Y %H:%M') }}
          {%- else -%}
            Unbekannt
          {%- endif %}
        icon: mdi:clock-edit
        icon_color: grey

      - type: button
        name: Zurueck zur Uebersicht
        icon: mdi:arrow-left
        tap_action:
          action: navigate
          navigation_path: /stein/uebersicht

