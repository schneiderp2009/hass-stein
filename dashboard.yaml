title: STEIN
views:
  - title: STEIN
    path: stein
    icon: mdi:home-group
    cards:

      - type: custom:mushroom-template-card
        primary: STEIN Einsatzbereitschaft
        secondary: >
          {%- set u = states('sensor.stein_api_stein_verbindung') -%}
          {%- set email = state_attr('sensor.stein_api_stein_verbindung', 'email') -%}
          {%- set scope = state_attr('sensor.stein_api_stein_verbindung', 'scope') -%}
          {{ u }}{% if email %} · {{ email }}{% endif %}{% if scope %} · {{ scope }}{% endif %}
        icon: mdi:shield-account
        icon_color: >
          {% if states('sensor.stein_api_stein_verbindung') not in ['Unbekannt', 'unavailable', 'unknown'] %}green{% else %}red{% endif %}

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id','defined') | selectattr('attributes.bu_id','equalto',19) | selectattr('attributes.status_raw','equalto','ready') | list | count }}"
            secondary: Bereit
            icon: mdi:check-circle
            icon_color: green
            layout: vertical
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Bereit"
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id','defined') | selectattr('attributes.bu_id','equalto',19) | selectattr('attributes.status_raw','equalto','semiready') | list | count }}"
            secondary: Bedingt
            icon: mdi:alert-circle
            icon_color: orange
            layout: vertical
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Bedingt"
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id','defined') | selectattr('attributes.bu_id','equalto',19) | selectattr('attributes.status_raw','equalto','notready') | list | count }}"
            secondary: Nicht bereit
            icon: mdi:close-circle
            icon_color: red
            layout: vertical
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Nicht bereit"
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id','defined') | selectattr('attributes.bu_id','equalto',19) | selectattr('attributes.status_raw','equalto','inuse') | list | count }}"
            secondary: Im Einsatz
            icon: mdi:fire-truck
            icon_color: blue
            layout: vertical
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Im Einsatz"
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id','defined') | selectattr('attributes.bu_id','equalto',19) | selectattr('attributes.status_raw','equalto','maint') | list | count }}"
            secondary: Wartung
            icon: mdi:wrench
            icon_color: purple
            layout: vertical
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Wartung"

      - type: custom:mushroom-chips-card
        chips:
          - type: template
            content: "Alle"
            icon: mdi:format-list-bulleted
            icon_color: >
              {%- if states('input_select.stein_filter') == 'Alle' %}grey{%- else %}grey{%- endif %}
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Alle"
          - type: template
            content: "Fahrzeuge"
            icon: mdi:fire-truck
            icon_color: >
              {%- if states('input_select.stein_filter') == 'Fahrzeuge' %}blue{%- else %}grey{%- endif %}
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Fahrzeuge"
          - type: template
            content: "Personal"
            icon: mdi:account
            icon_color: >
              {%- if states('input_select.stein_filter') == 'Personal' %}teal{%- else %}grey{%- endif %}
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Personal"
          - type: template
            content: "Einheiten"
            icon: mdi:account-group
            icon_color: >
              {%- if states('input_select.stein_filter') == 'Einheiten' %}purple{%- else %}grey{%- endif %}
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Einheiten"
          - type: template
            content: "Anhaenger"
            icon: mdi:truck-trailer
            icon_color: >
              {%- if states('input_select.stein_filter') == 'Anhaenger' %}orange{%- else %}grey{%- endif %}
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Anhaenger"
          - type: template
            content: "Probleme"
            icon: mdi:alert
            icon_color: >
              {%- if states('input_select.stein_filter') == 'Probleme' %}red{%- else %}grey{%- endif %}
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Probleme"
          - type: template
            content: "Bereit"
            icon: mdi:check-circle
            icon_color: >
              {%- if states('input_select.stein_filter') == 'Bereit' %}green{%- else %}grey{%- endif %}
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Bereit"
          - type: template
            content: "Im Einsatz"
            icon: mdi:fire-truck
            icon_color: >
              {%- if states('input_select.stein_filter') == 'Im Einsatz' %}blue{%- else %}grey{%- endif %}
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.stein_filter
                option: "Im Einsatz"

      - type: custom:mushroom-title-card
        title: "Fahrzeuge"
        card_mod:
          style: |
            :host {
              display: {{ 'block' if states('input_select.stein_filter') in ['Alle', 'Fahrzeuge'] or
                (states('input_select.stein_filter') == 'Probleme' and
                 [state_attr('sensor.gkw_status', 'status_raw') not in ['ready'], state_attr('sensor.lkw_werkstatt_status', 'status_raw') not in ['ready'], state_attr('sensor.stapler_35_to_status', 'status_raw') not in ['ready'], state_attr('sensor.mtw_tz_status', 'status_raw') not in ['ready'], state_attr('sensor.lkw_kipper_lkr_status', 'status_raw') not in ['ready'], state_attr('sensor.nea_200kva_status', 'status_raw') not in ['ready'], state_attr('sensor.lkw_lbw_status', 'status_raw') not in ['ready'], state_attr('sensor.mtw_ov_status', 'status_raw') not in ['ready'], state_attr('sensor.mzkw_status', 'status_raw') not in ['ready']] | select('equalto', true) | list | count > 0)
                else 'none' }};
            }

      - type: custom:mushroom-template-card
        entity: sensor.gkw_status
        primary: >
          {{ state_attr('sensor.gkw_status', 'label') | default('GKW') }}
          {%- if state_attr('sensor.gkw_status', 'radio_name') %} · {{ state_attr('sensor.gkw_status', 'radio_name') }}{%- endif %}
          {%- if state_attr('sensor.gkw_status', 'name') %} · {{ state_attr('sensor.gkw_status', 'name') }}{%- endif %}
        secondary: >
          {{ states('sensor.gkw_status') }}
          {%- if state_attr('sensor.gkw_status', 'comment') and state_attr('sensor.gkw_status', 'comment') | trim | length > 0 %} · {{ state_attr('sensor.gkw_status', 'comment') }}{%- endif %}
        icon: >
          {%- set st = state_attr('sensor.gkw_status', 'status_raw') -%}
          {%- if st == 'ready' %}mdi:check-circle
          {%- elif st == 'notready' %}mdi:close-circle
          {%- elif st == 'semiready' %}mdi:alert-circle
          {%- elif st == 'inuse' %}mdi:fire-truck
          {%- elif st == 'maint' %}mdi:wrench
          {%- else %}mdi:help-circle{%- endif %}
        icon_color: >
          {%- set st = state_attr('sensor.gkw_status', 'status_raw') -%}
          {%- if st == 'ready' %}green
          {%- elif st == 'notready' %}red
          {%- elif st == 'semiready' %}orange
          {%- elif st == 'inuse' %}blue
          {%- elif st == 'maint' %}purple
          {%- else %}grey{%- endif %}
        badge_icon: >
          {%- if state_attr('sensor.gkw_status', 'operation_reservation') %}mdi:bookmark-check{%- endif %}
        badge_color: blue
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.popup
            data:
              title: "GKW"
              content:
                type: vertical-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: >
                      {{ state_attr('sensor.gkw_status', 'label') | default('GKW') }}
                    secondary: >
                      {%- set ts = state_attr('sensor.gkw_status', 'last_modified') -%}
                      {%- set by = state_attr('sensor.gkw_status', 'last_modified_by') -%}
                      {%- if by and ts %}Zuletzt von {{ by }} am {{ as_timestamp(ts) | timestamp_custom('%d. %b %Y %H:%M') }}{%- endif %}
                    icon: >
                      {%- set s = state_attr('sensor.gkw_status', 'status_raw') -%}
                      {%- if s == 'ready' %}mdi:check-circle
                      {%- elif s == 'notready' %}mdi:close-circle
                      {%- elif s == 'semiready' %}mdi:alert-circle
                      {%- elif s == 'inuse' %}mdi:fire-truck
                      {%- elif s == 'maint' %}mdi:wrench
                      {%- else %}mdi:help-circle{%- endif %}
                    icon_color: >
                      {%- set s = state_attr('sensor.gkw_status', 'status_raw') -%}
                      {%- if s == 'ready' %}green
                      {%- elif s == 'notready' %}red
                      {%- elif s == 'semiready' %}orange
                      {%- elif s == 'inuse' %}blue
                      {%- else %}purple{%- endif %}
                  - type: entities
                    show_header_toggle: false
                    entities:
                      - entity: select.gkw_status_setzen
                        name: Status
                      - entity: switch.gkw_einsatzreservierung
                        name: Einsatzreservierung
                      - entity: text.gkw_label
                        name: Bezeichnung
                      - entity: text.gkw_radioname
                        name: Funkrufname
                      - entity: text.gkw_comment
                        name: Kommentar
                  - type: entities
                    title: Details
                    show_header_toggle: false
                    entities:
                      - type: attribute
                        entity: sensor.gkw_status
                        attribute: category
                        name: Kategorie
                        icon: mdi:shape
                      - type: attribute
                        entity: sensor.gkw_status
                        attribute: radio_name
                        name: Funkrufname
                        icon: mdi:radio
                      - type: attribute
                        entity: sensor.gkw_status
                        attribute: issi
                        name: ISSI
                        icon: mdi:signal
                      - type: attribute
                        entity: sensor.gkw_status
                        attribute: comment
                        name: Kommentar
                        icon: mdi:comment-text
                      - type: attribute
                        entity: sensor.gkw_status
                        attribute: hu_valid_until
                        name: HU gueltig bis
                        icon: mdi:calendar-check
                      - type: attribute
                        entity: sensor.gkw_status
                        attribute: last_modified_by
                        name: Geaendert von
                        icon: mdi:account-edit
        card_mod:
          style: |
            :host {
              display: {{ 'block' if states('input_select.stein_filter') in ['Alle', 'Fahrzeuge'] or
                (states('input_select.stein_filter') == 'Probleme' and state_attr('sensor.gkw_status', 'status_raw') not in ['ready']) or
                (states('input_select.stein_filter') == 'Bereit' and state_attr('sensor.gkw_status', 'status_raw') == 'ready') or
                (states('input_select.stein_filter') == 'Bedingt' and state_attr('sensor.gkw_status', 'status_raw') == 'semiready') or
                (states('input_select.stein_filter') == 'Nicht bereit' and state_attr('sensor.gkw_status', 'status_raw') == 'notready') or
                (states('input_select.stein_filter') == 'Im Einsatz' and state_attr('sensor.gkw_status', 'status_raw') == 'inuse') or
                (states('input_select.stein_filter') == 'Wartung' and state_attr('sensor.gkw_status', 'status_raw') == 'maint') else 'none' }};
            }

