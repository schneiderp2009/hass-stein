title: STEIN
views:

  - title: Uebersicht
    path: uebersicht
    icon: mdi:home-group
    cards:
      - type: custom:mushroom-title-card
        title: STEIN Einsatzbereitschaft

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id', 'defined') | selectattr('attributes.bu_id', 'equalto', 19) | selectattr('attributes.status_raw', 'equalto', 'ready') | list | count }}"
            secondary: Bereit
            icon: mdi:check-circle
            icon_color: green
            layout: vertical
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id', 'defined') | selectattr('attributes.bu_id', 'equalto', 19) | selectattr('attributes.status_raw', 'equalto', 'semiready') | list | count }}"
            secondary: Bedingt
            icon: mdi:alert-circle
            icon_color: orange
            layout: vertical
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id', 'defined') | selectattr('attributes.bu_id', 'equalto', 19) | selectattr('attributes.status_raw', 'equalto', 'notready') | list | count }}"
            secondary: Nicht bereit
            icon: mdi:close-circle
            icon_color: red
            layout: vertical
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id', 'defined') | selectattr('attributes.bu_id', 'equalto', 19) | selectattr('attributes.status_raw', 'equalto', 'inuse') | list | count }}"
            secondary: Im Einsatz
            icon: mdi:fire-truck
            icon_color: blue
            layout: vertical
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id', 'defined') | selectattr('attributes.bu_id', 'equalto', 19) | selectattr('attributes.status_raw', 'equalto', 'maint') | list | count }}"
            secondary: Wartung
            icon: mdi:wrench
            icon_color: purple
            layout: vertical

      - type: entities
        title: Handlungsbedarf
        show_header_toggle: false
        entities:
          - entity: sensor.gkw_status
            name: GKW
          - entity: sensor.lkw_werkstatt_status
            name: LKW Werkstatt
          - entity: sensor.anh_status
            name: Anh.
        card_mod:
          style: |
            .entity:has([title="Einsatzbereit"]) {
              display: none;
            }

      - type: entities
        title: Alle Ressourcen
        show_header_toggle: false
        entities:
          - entity: sensor.gkw_status
            name: GKW
          - entity: sensor.lkw_werkstatt_status
            name: LKW Werkstatt
          - entity: sensor.stapler_35_to_status
            name: Stapler 3,5 to
          - entity: sensor.mtw_tz_status
            name: MTW TZ
          - entity: sensor.lkw_kipper_lkr_status
            name: LKW Kipper Lkr
          - entity: sensor.nea_200kva_status
            name: NEA 200kVA
          - entity: sensor.lkw_lbw_status
            name: LKW Lbw
          - entity: sensor.mtw_ov_status
            name: MTW OV
          - entity: sensor.mzkw_status
            name: MzKW
          - entity: sensor.anh_status
            name: Anh.
          - entity: sensor.anh_tieflader_13t_status
            name: Anh. Tieflader 13t
          - entity: sensor.anhanger_status
            name: Anhaenger
          - entity: sensor.nea_50_kva_lima_status
            name: NEA 50 kVA LiMa
          - entity: sensor.anh_pf_12t_status
            name: Anh. PF 12t
          - entity: sensor.technischer_berater_arbeitssicherheit_status
            name: Techn. Berater Arbeitssicherheit
          - entity: sensor.fachberater_status
            name: Fachberater
          - entity: sensor.fachgruppe_elektroversorgung_status
            name: FG Elektroversorgung
          - entity: sensor.fachgruppe_notversorgung_und_notinstandsetzung_status
            name: FG Notversorgung
          - entity: sensor.bergungsgruppe_status
            name: Bergungsgruppe
          - entity: sensor.zugtrupp_status
            name: Zugtrupp
          - entity: sensor.luk_status
            name: LuK

  - title: Gruppen
    path: gruppen
    icon: mdi:folder-multiple
    cards:
      - type: custom:mushroom-title-card
        title: Ressourcen nach Gruppe

      - type: entities
        title: Fahrzeuge
        show_header_toggle: false
        entities:
          - entity: sensor.gkw_status
            name: GKW
          - entity: sensor.lkw_werkstatt_status
            name: LKW Werkstatt
          - entity: sensor.stapler_35_to_status
            name: Stapler 3,5 to
          - entity: sensor.mtw_tz_status
            name: MTW TZ
          - entity: sensor.lkw_kipper_lkr_status
            name: LKW Kipper Lkr
          - entity: sensor.nea_200kva_status
            name: NEA 200kVA
          - entity: sensor.lkw_lbw_status
            name: LKW Lbw
          - entity: sensor.mtw_ov_status
            name: MTW OV
          - entity: sensor.mzkw_status
            name: MzKW

      - type: entities
        title: Anhaenger
        show_header_toggle: false
        entities:
          - entity: sensor.anh_status
            name: Anh.
          - entity: sensor.anh_tieflader_13t_status
            name: Anh. Tieflader 13t
          - entity: sensor.anhanger_status
            name: Anhaenger
          - entity: sensor.nea_50_kva_lima_status
            name: NEA 50 kVA LiMa
          - entity: sensor.anh_pf_12t_status
            name: Anh. PF 12t

      - type: entities
        title: Personal
        show_header_toggle: false
        entities:
          - entity: sensor.technischer_berater_arbeitssicherheit_status
            name: Techn. Berater Arbeitssicherheit
          - entity: sensor.fachberater_status
            name: Fachberater

      - type: entities
        title: Einheiten
        show_header_toggle: false
        entities:
          - entity: sensor.fachgruppe_elektroversorgung_status
            name: FG Elektroversorgung
          - entity: sensor.fachgruppe_notversorgung_und_notinstandsetzung_status
            name: FG Notversorgung
          - entity: sensor.bergungsgruppe_status
            name: Bergungsgruppe
          - entity: sensor.zugtrupp_status
            name: Zugtrupp
          - entity: sensor.luk_status
            name: LuK

  - title: Lage
    path: lage
    icon: mdi:alert-circle
    cards:
