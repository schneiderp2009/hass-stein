                      {%- elif s == 'semiready' %}mdi:alert-circle
                      {%- elif s == 'inuse' %}mdi:fire-truck
                      {%- elif s == 'maint' %}mdi:wrench
                      {%- else %}mdi:help-circle{%- endif %}
                    icon_color: >
                      {%- set s = state_attr('sensor.lkw_werkstatt_status', 'status_raw') -%}
                      {%- if s == 'ready' %}green
                      {%- elif s == 'notready' %}red
