          type: custom:mushroom-template-card
          primary: "{{ state_attr(entity,'label') | default(state_attr(entity,'friendly_name')) }}"
          secondary: "{{ states(entity) }}{% if state_attr(entity,'comment') and state_attr(entity,'comment') | trim | length > 0 %} · {{ state_attr(entity,'comment') }}{% endif %}"
          icon: >
            {% set s = state_attr(entity,'status_raw') %}
            {% if s == 'ready' %}mdi:check-circle{% elif s == 'notready' %}mdi:close-circle{% elif s == 'semiready' %}mdi:alert-circle{% elif s == 'inuse' %}mdi:fire-truck{% elif s == 'maint' %}mdi:wrench{% else %}mdi:help-circle{% endif %}
          icon_color: >
            {% set s = state_attr(entity,'status_raw') %}
            {% if s == 'ready' %}green{% elif s == 'notready' %}red{% elif s == 'semiready' %}orange{% elif s == 'inuse' %}blue{% elif s == 'maint' %}purple{% else %}grey{% endif %}
          tap_action:
            action: more-info
        filter:
          include:
            - attributes:
                bu_id: 19
                group_id: 2
        sort:
          method: attribute
          attribute: sort_order
        show_empty: false
        card_mod:
          style: ":host { display: {{ 'block' if states('input_select.stein_filter') in ['Alle','Gruppe 2','Bereit','Bedingt','Nicht bereit','Im Einsatz','Wartung','Probleme'] else 'none' }}; }"

      # ── Gruppe 3: Sonderfunktionen ────────────────────────────────────────
      - type: custom:mushroom-title-card
        title: Sonderfunktionen
        card_mod:
          style: ":host { display: {{ 'block' if states('input_select.stein_filter') in ['Alle','Gruppe 3','Bereit','Bedingt','Nicht bereit','Im Einsatz','Wartung','Probleme'] else 'none' }}; }"

      - type: custom:auto-entities
        card:
          type: custom:mushroom-template-card
          primary: "{{ state_attr(entity,'label') | default(state_attr(entity,'friendly_name')) }}"
          secondary: "{{ states(entity) }}{% if state_attr(entity,'comment') and state_attr(entity,'comment') | trim | length > 0 %} · {{ state_attr(entity,'comment') }}{% endif %}"
          icon: >
            {% set s = state_attr(entity,'status_raw') %}
            {% if s == 'ready' %}mdi:check-circle{% elif s == 'notready' %}mdi:close-circle{% elif s == 'semiready' %}mdi:alert-circle{% elif s == 'inuse' %}mdi:fire-truck{% elif s == 'maint' %}mdi:wrench{% else %}mdi:help-circle{% endif %}
          icon_color: >
            {% set s = state_attr(entity,'status_raw') %}
            {% if s == 'ready' %}green{% elif s == 'notready' %}red{% elif s == 'semiready' %}orange{% elif s == 'inuse' %}blue{% elif s == 'maint' %}purple{% else %}grey{% endif %}
          tap_action:
            action: more-info
        filter:
          include:
            - attributes:
                bu_id: 19
                group_id: 3
        sort:
          method: attribute
          attribute: sort_order
        show_empty: false
        card_mod:
          style: ":host { display: {{ 'block' if states('input_select.stein_filter') in ['Alle','Gruppe 3','Bereit','Bedingt','Nicht bereit','Im Einsatz','Wartung','Probleme'] else 'none' }}; }"

      # ── Gruppe 4: Einheiten ───────────────────────────────────────────────
      - type: custom:mushroom-title-card
        title: Einheiten
        card_mod:
          style: ":host { display: {{ 'block' if states('input_select.stein_filter') in ['Alle','Gruppe 4','Bereit','Bedingt','Nicht bereit','Im Einsatz','Wartung','Probleme'] else 'none' }}; }"

      - type: custom:auto-entities
        card:
          type: custom:mushroom-template-card
          primary: "{{ state_attr(entity,'label') | default(state_attr(entity,'friendly_name')) }}"
          secondary: "{{ states(entity) }}{% if state_attr(entity,'comment') and state_attr(entity,'comment') | trim | length > 0 %} · {{ state_attr(entity,'comment') }}{% endif %}"
          icon: >
            {% set s = state_attr(entity,'status_raw') %}
            {% if s == 'ready' %}mdi:check-circle{% elif s == 'notready' %}mdi:close-circle{% elif s == 'semiready' %}mdi:alert-circle{% elif s == 'inuse' %}mdi:fire-truck{% elif s == 'maint' %}mdi:wrench{% else %}mdi:help-circle{% endif %}
          icon_color: >
            {% set s = state_attr(entity,'status_raw') %}
            {% if s == 'ready' %}green{% elif s == 'notready' %}red{% elif s == 'semiready' %}orange{% elif s == 'inuse' %}blue{% elif s == 'maint' %}purple{% else %}grey{% endif %}
          tap_action:
            action: more-info
        filter:
          include:
            - attributes:
                bu_id: 19
                group_id: 4
        sort:
          method: attribute
          attribute: sort_order
        show_empty: false
        card_mod:
          style: ":host { display: {{ 'block' if states('input_select.stein_filter') in ['Alle','Gruppe 4','Bereit','Bedingt','Nicht bereit','Im Einsatz','Wartung','Probleme'] else 'none' }}; }"

      # ── Gruppe 5: Anhaenger ───────────────────────────────────────────────
      - type: custom:mushroom-title-card
        title: Anhaenger
        card_mod:
          style: ":host { display: {{ 'block' if states('input_select.stein_filter') in ['Alle','Gruppe 5','Bereit','Bedingt','Nicht bereit','Im Einsatz','Wartung','Probleme'] else 'none' }}; }"

      - type: custom:auto-entities
        card:
          type: custom:mushroom-template-card
          primary: "{{ state_attr(entity,'label') | default(state_attr(entity,'friendly_name')) }}"
          secondary: "{{ states(entity) }}{% if state_attr(entity,'comment') and state_attr(entity,'comment') | trim | length > 0 %} · {{ state_attr(entity,'comment') }}{% endif %}"
          icon: >
            {% set s = state_attr(entity,'status_raw') %}
            {% if s == 'ready' %}mdi:check-circle{% elif s == 'notready' %}mdi:close-circle{% elif s == 'semiready' %}mdi:alert-circle{% elif s == 'inuse' %}mdi:fire-truck{% elif s == 'maint' %}mdi:wrench{% else %}mdi:help-circle{% endif %}
          icon_color: >
            {% set s = state_attr(entity,'status_raw') %}
            {% if s == 'ready' %}green{% elif s == 'notready' %}red{% elif s == 'semiready' %}orange{% elif s == 'inuse' %}blue{% elif s == 'maint' %}purple{% else %}grey{% endif %}
