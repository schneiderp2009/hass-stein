    icon: mdi:pencil
    cards:
      - type: custom:mushroom-title-card
        title: Status aendern

      - type: entities
        title: Status
        show_header_toggle: false
        entities:
          - entity: select.gkw_status_setzen
            name: GKW
          - entity: select.lkw_werkstatt_status_setzen
            name: LKW Werkstatt
          - entity: select.stapler_35_to_status_setzen
            name: Stapler 3,5 to
          - entity: select.mtw_tz_status_setzen
            name: MTW TZ
          - entity: select.lkw_kipper_lkr_status_setzen
            name: LKW Kipper Lkr
          - entity: select.nea_200kva_status_setzen
            name: NEA 200kVA
          - entity: select.lkw_lbw_status_setzen
            name: LKW Lbw
          - entity: select.mtw_ov_status_setzen
            name: MTW OV
          - entity: select.mzkw_status_setzen
            name: MzKW
          - entity: select.anh_status_setzen
            name: Anh.
          - entity: select.anh_tieflader_13t_status_setzen
            name: Anh. Tieflader 13t
          - entity: select.anhanger_status_setzen
            name: Anhaenger
          - entity: select.nea_50_kva_lima_status_setzen
