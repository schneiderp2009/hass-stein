                  primary: "{{ state_attr(config.entity,'label') | default(state_attr(config.entity,'friendly_name')) }}{% if state_attr(config.entity,'radio_name') %} · {{ state_attr(config.entity,'radio_name') }}{% endif %}"
                  secondary: "{{ states(config.entity) }}"
                  icon: mdi:fire-truck
                  icon_color: blue
                  tap_action:
                    action: call-service
                    service: input_text.set_value
                    service_data:
                      entity_id: input_text.stein_selected
                      value: "{{ config.entity }}"
