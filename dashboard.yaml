                    - '{{ config.entity | replace(''sensor.'',''text.'') | replace(''_status'',''_issi'') }}'
                  - type: entities
                    title: Details
                    show_header_toggle: false
                    entities:
                    - type: attribute
                      entity: '{{ config.entity }}'
                      attribute: radio_name
                      name: Funkrufname
                      icon: mdi:radio
                    - type: attribute
                      entity: '{{ config.entity }}'
                      attribute: issi
                      name: ISSI
                      icon: mdi:signal
                    - type: attribute
                      entity: '{{ config.entity }}'
                      attribute: hu_valid_until
                      name: HU gueltig bis
                      icon: mdi:calendar-check
                    - type: attribute
                      entity: '{{ config.entity }}'
                      attribute: last_modified_by
