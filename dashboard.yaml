title: STEIN
views:

  - title: Uebersicht
    path: uebersicht
    icon: mdi:home-group
    cards:
      - type: custom:mushroom-title-card
        title: STEIN Einsatzbereitschaft

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id', 'defined') | selectattr('attributes.bu_id', 'equalto', 19) | selectattr('attributes.status_raw', 'equalto', 'ready') | list | count }}"
            secondary: Bereit
            icon: mdi:check-circle
            icon_color: green
            layout: vertical
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id', 'defined') | selectattr('attributes.bu_id', 'equalto', 19) | selectattr('attributes.status_raw', 'equalto', 'semiready') | list | count }}"
            secondary: Bedingt
            icon: mdi:alert-circle
            icon_color: orange
            layout: vertical
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id', 'defined') | selectattr('attributes.bu_id', 'equalto', 19) | selectattr('attributes.status_raw', 'equalto', 'notready') | list | count }}"
            secondary: Nicht bereit
            icon: mdi:close-circle
            icon_color: red
            layout: vertical
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id', 'defined') | selectattr('attributes.bu_id', 'equalto', 19) | selectattr('attributes.status_raw', 'equalto', 'inuse') | list | count }}"
            secondary: Im Einsatz
            icon: mdi:fire-truck
            icon_color: blue
            layout: vertical
          - type: custom:mushroom-template-card
            primary: "{{ states.sensor | selectattr('attributes.bu_id', 'defined') | selectattr('attributes.bu_id', 'equalto', 19) | selectattr('attributes.status_raw', 'equalto', 'maint') | list | count }}"
            secondary: Wartung
            icon: mdi:wrench
            icon_color: purple
            layout: vertical

      - type: custom:auto-entities
        card:
          type: entities
          title: Handlungsbedarf
          show_header_toggle: false
        filter:
          include:
            - attributes:
                bu_id: 19
                status_raw: notready
            - attributes:
                bu_id: 19
                status_raw: semiready
            - attributes:
                bu_id: 19
                status_raw: maint
          exclude:
            - attributes:
                group_id: 3
        sort:
          method: attribute
          attribute: status_raw

      - type: custom:auto-entities
        card:
          type: entities
          title: Alle Ressourcen
          show_header_toggle: false
        filter:
          include:
            - attributes:
                bu_id: 19
        sort:
          method: attribute
          attribute: group_id

  - title: Gruppen
    path: gruppen
    icon: mdi:folder-multiple
    cards:
      - type: custom:mushroom-title-card
        title: Ressourcen nach Gruppe

      - type: custom:auto-entities
        card:
          type: entities
          title: Fahrzeuge
          show_header_toggle: false
        filter:
          include:
            - attributes:
                bu_id: 19
                group_id: 1
        sort:
          method: attribute
          attribute: sort_order

      - type: custom:auto-entities
        card:
          type: entities
          title: Personal
          show_header_toggle: false
        filter:
          include:
            - attributes:
                bu_id: 19
                group_id: 3
        sort:
          method: attribute
          attribute: sort_order

      - type: custom:auto-entities
        card:
          type: entities
          title: Einheiten
          show_header_toggle: false
        filter:
          include:
            - attributes:
                bu_id: 19
                group_id: 4
        sort:
          method: attribute
          attribute: sort_order

      - type: custom:auto-entities
        card:
          type: entities
          title: Anhaenger
          show_header_toggle: false
        filter:
          include:
            - attributes:
                bu_id: 19
                group_id: 5
        sort:
          method: attribute
          attribute: sort_order

  - title: Lage
    path: lage
    icon: mdi:alert-circle
    cards:
      - type: custom:mushroom-title-card
        title: Aktuelle Lage

      - type: custom:auto-entities
        card:
          type: entities
          title: Im Einsatz
          show_header_toggle: false
        filter:
          include:
            - attributes:
                bu_id: 19
                status_raw: inuse
        sort:
          method: friendly_name

      - type: custom:auto-entities
        card:
          type: entities
          title: Bedingt einsatzbereit
          show_header_toggle: false
        filter:
          include:
            - attributes:
                bu_id: 19
                status_raw: semiready
        sort:
          method: friendly_name

      - type: custom:auto-entities
        card:
          type: entities
          title: Nicht einsatzbereit
          show_header_toggle: false
        filter:
          include:
            - attributes:
                bu_id: 19
                status_raw: notready
        sort:
          method: friendly_name

      - type: custom:auto-entities
        card:
          type: entities
          title: In Wartung
          show_header_toggle: false
        filter:
          include:
            - attributes:
                bu_id: 19
                status_raw: maint
        sort:
          method: friendly_name

  - title: Bearbeiten
    path: bearbeiten
    icon: mdi:pencil
    cards:
      - type: custom:mushroom-title-card
        title: Status aendern

      - type: custom:auto-entities
        card:
          type: entities
          title: Status
          show_header_toggle: false
        filter:
          include:
            - attributes:
                bu_id: 19
              domain: select
        sort:
          method: friendly_name

      - type: custom:auto-entities
        card:
          type: entities
          title: Einsatzreservierungen
          show_header_toggle: false
        filter:
          include:
            - attributes:
                bu_id: 19
              domain: switch
        sort:
          method: friendly_name

  - title: Ortsverband
    path: ortsverband
    icon: mdi:information
    cards:
      - type: custom:mushroom-title-card
        title: Ortsverband

      - type: custom:auto-entities
        card:
          type: entities
          title: BU Statistiken
          show_header_toggle: false
        filter:
          include:
            - attributes:
                bu_id: 19
              domain: sensor
              entity_id: "*bu*"
        sort:
          method: friendly_name

      - type: entities
        title: API Verbindung
        entities:
          - entity: sensor.stein_verbindung
            name: Nutzer
          - type: attribute
            entity: sensor.stein_verbindung
            attribute: email
            name: E-Mail
            icon: mdi:email
          - type: attribute
            entity: sensor.stein_verbindung
            attribute: scope
            name: Zugriffsbereich
            icon: mdi:shield-account
          - type: attribute
            entity: sensor.stein_verbindung
            attribute: active
            name: Aktiv
            icon: mdi:check-circle
