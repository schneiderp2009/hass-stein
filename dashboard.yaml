        conditions:
          - condition: state
            entity: input_select.stein_filter
            state: Bereit
        card:
          type: custom:auto-entities
          card:
            type: grid
            columns: 1
            square: false
          card_param: cards
          filter:
            include:
              - attributes:
                  bu_id: 19
                  group_id: 1
                  status_raw: ready
                options:
                  type: custom:mushroom-template-card
                  primary: "{{ state_attr(config.entity,'label') | default(state_attr(config.entity,'friendly_name')) }}{% if state_attr(config.entity,'radio_name') %} · {{ state_attr(config.entity,'radio_name') }}{% endif %}"
                  secondary: "{{ states(config.entity) }}"
                  icon: mdi:check-circle
                  icon_color: green
                  tap_action:
                    action: call-service
                    service: input_text.set_value
                    service_data:
                      entity_id: input_text.stein_selected
                      value: "{{ config.entity }}"
          sort:
            method: attribute
            attribute: sort_order
          show_empty: false

