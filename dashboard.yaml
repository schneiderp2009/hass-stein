  - title: Ortsverband
    path: ortsverband
    icon: mdi:information
    cards:
      - type: custom:mushroom-title-card
        title: Ortsverband
      - type: entities
        title: API Verbindung
        entities:
          - entity: sensor.stein_verbindung
            name: Nutzer
          - type: attribute
            entity: sensor.stein_verbindung
            attribute: email
            name: E-Mail
            icon: mdi:email
          - type: attribute
            entity: sensor.stein_verbindung
            attribute: scope
            name: Zugriffsbereich
            icon: mdi:shield-account
          - type: attribute
            entity: sensor.stein_verbindung
            attribute: active
            name: Aktiv
            icon: mdi:check-circle
