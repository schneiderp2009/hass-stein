        title: Aktuelle Lage

      - type: conditional
        conditions:
          - condition: state
            entity: sensor.gkw_status
            state_not: Einsatzbereit
        card:
          type: custom:mushroom-entity-card
          entity: sensor.gkw_status
          name: GKW

      - type: conditional
        conditions:
          - condition: state
            entity: sensor.lkw_werkstatt_status
